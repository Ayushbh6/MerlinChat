<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;1,14..32,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        background: linear-gradient(180deg, #f2efe8, #efe5d6);
        color: #1f1b18;
        color-scheme: light;
      }

      :root[data-theme='dark'] {
        background: linear-gradient(180deg, #0c1117, #16202b);
        color: #edf3f9;
        color-scheme: dark;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: inherit;
        color: inherit;
      }
    </style>
    <script>
      (function () {
        var theme = localStorage.getItem('calendar-theme');
        document.documentElement.setAttribute(
          'data-theme',
          theme === 'dark' ? 'dark' : 'light'
        );
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
